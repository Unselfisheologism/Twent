<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenUI Render</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{width:100%;min-height:100vh;background:#0a0a0a;color:#e4e4e7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.openui-stack{display:flex;flex-direction:column;gap:12px;width:100%}
.openui-stack-row{flex-direction:row;flex-wrap:wrap}
.openui-card{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:16px;overflow:hidden}
.openui-card-header{font-size:18px;font-weight:700;color:#fafafa;margin-bottom:4px}
.openui-card-subtitle{font-size:13px;color:#a1a1aa;margin-bottom:12px}
.openui-text{line-height:1.6;color:#e4e4e7}
.openui-text-large-heavy{font-size:28px;font-weight:800;color:#fafafa;letter-spacing:-0.5px}
.openui-text-large{font-size:20px;font-weight:600;color:#fafafa}
.openui-text-medium{font-size:15px;color:#d4d4d8}
.openui-text-small{font-size:13px;color:#a1a1aa}
.openui-text-small-heavy{font-size:13px;font-weight:700;color:#e4e4e7}
.openui-text-tiny{font-size:11px;color:#71717a}
.openui-table{width:100%;border-collapse:collapse;font-size:13px}
.openui-table th{text-align:left;padding:10px 12px;background:#1e1e22;color:#a1a1aa;font-weight:600;border-bottom:2px solid #27272a;font-size:12px;text-transform:uppercase;letter-spacing:0.5px}
.openui-table td{padding:10px 12px;border-bottom:1px solid #1f1f23;color:#e4e4e7}
.openui-table tr:hover td{background:#1a1a1e}
.openui-table .num{text-align:right;font-variant-numeric:tabular-nums}
.openui-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.openui-tag-neutral{background:#27272a;color:#a1a1aa}
.openui-tag-success{background:#052e16;color:#4ade80}
.openui-tag-warning{background:#422006;color:#fbbf24}
.openui-tag-danger{background:#450a0a;color:#f87171}
.openui-tag-info{background:#0c1a2d;color:#60a5fa}
.openui-tag-primary{background:#1e1b4b;color:#818cf8}
.openui-tag-sm{padding:2px 8px;font-size:10px}
.openui-tag-lg{padding:5px 14px;font-size:13px}
.openui-chart-container{width:100%;height:260px;position:relative}
.openui-chart-container canvas{width:100%!important;height:100%!important}
.openui-image{max-width:100%;border-radius:8px;display:block}
.openui-form{display:flex;flex-direction:column;gap:14px}
.openui-form-control{display:flex;flex-direction:column;gap:5px}
.openui-form-control>label{font-size:13px;font-weight:600;color:#a1a1aa}
.openui-input,.openui-select{background:#0f0f12;border:1px solid #27272a;border-radius:8px;padding:10px 12px;color:#e4e4e7;font-size:14px;outline:none;transition:border-color .2s}
.openui-input:focus,.openui-select:focus{border-color:#6366f1}
.openui-input::placeholder{color:#52525b}
.openui-btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.openui-btn-primary{background:#6366f1;color:#fff}
.openui-btn-primary:hover{background:#4f46e5}
.openui-btn-secondary{background:#27272a;color:#e4e4e7}
.openui-btn-secondary:hover{background:#3f3f46}
.openui-btn-success{background:#16a34a;color:#fff}
.openui-btn-danger{background:#dc2626;color:#fff}
.openui-btn-row{display:flex;gap:8px;flex-wrap:wrap}
.openui-callout{padding:12px 16px;border-radius:8px;font-size:13px;display:flex;align-items:flex-start;gap:10px}
.openui-callout-info{background:#0c1a2d;border:1px solid #1e3a5f;color:#93c5fd}
.openui-callout-success{background:#052e16;border:1px solid #14532d;color:#86efac}
.openui-callout-warning{background:#422006;border:1px solid #78350f;color:#fde68a}
.openui-callout-error{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5}
.openui-callout-icon{font-size:16px;flex-shrink:0}
.openui-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.openui-modal{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:24px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.openui-modal-title{font-size:18px;font-weight:700;color:#fafafa;margin-bottom:16px}
.openui-followup{background:#1e1e22;border:1px solid #27272a;border-radius:10px;padding:12px 16px;cursor:pointer;transition:all .15s;font-size:13px;color:#d4d4d8}
.openui-followup:hover{border-color:#6366f1;background:#232329}
.openui-list-item{padding:12px 16px;border-bottom:1px solid #1f1f23}
.openui-list-item:last-child{border-bottom:none}
.openui-list-item-title{font-weight:600;color:#e4e4e7;font-size:14px}
.openui-list-item-sub{color:#a1a1aa;font-size:12px;margin-top:2px}
.openui-code{background:#0f0f12;border:1px solid #27272a;border-radius:8px;padding:14px;font-family:"SF Mono",Monaco,Consolas,monospace;font-size:12px;overflow-x:auto;white-space:pre;color:#a5b4fc}
.openui-accordion-item{border:1px solid #27272a;border-radius:8px;overflow:hidden}
.openui-accordion-trigger{padding:12px 16px;background:#1e1e22;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;color:#e4e4e7;font-size:14px}
.openui-accordion-content{padding:12px 16px;border-top:1px solid #27272a}
.openui-tabs{display:flex;gap:0;border-bottom:2px solid #27272a;margin-bottom:16px}
.openui-tab{padding:10px 16px;cursor:pointer;font-size:13px;font-weight:600;color:#71717a;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.openui-tab.active{color:#6366f1;border-bottom-color:#6366f1}
.openui-tab-content{padding:4px 0}
.openui-section-block{border-top:1px solid #27272a;padding-top:16px;margin-top:8px}
.openui-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#71717a;margin-bottom:10px}
.openui-separator{height:1px;background:#27272a;margin:8px 0}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;color:#52525b}
.error-box{background:#450a0a;border:1px solid #7f1d1d;border-radius:8px;padding:16px;margin:16px;color:#fca5a5;font-size:13px}
</style>
</head>
<body>
<div id="root"><div class="loading">Rendering UI...</div></div>
<script>
// ====== OpenUI Lang Parser ======
(function(){
"use strict";

function parseOpenUILang(code) {
  var lines = code.split('\n');
  var statements = {};
  var lineNum = 0;
  for (var i = 0; i < lines.length; i++) {
    lineNum++;
    var line = lines[i].trim();
    if (!line || line.startsWith('//')) continue;
    var eqIdx = line.indexOf('=');
    if (eqIdx < 0) continue;
    var name = line.substring(0, eqIdx).trim();
    var valueStr = line.substring(eqIdx + 1).trim();
    try {
      statements[name] = parseExpression(valueStr);
    } catch(e) {
      console.warn('Parse error on line ' + lineNum + ': ' + e.message);
    }
  }
  return statements;
}

function parseExpression(s) {
  s = s.trim();
  if (s === 'null' || s === 'nil') return { type: 'null' };
  if (s === 'true') return { type: 'boolean', value: true };
  if (s === 'false') return { type: 'boolean', value: false };
  if (/^-?\d+(\.\d+)?$/.test(s)) return { type: 'number', value: parseFloat(s) };
  if (s.startsWith('"') && s.endsWith('"')) {
    return { type: 'string', value: s.slice(1, -1).replace(/\\"/g, '"').replace(/\\n/g, '\n') };
  }
  if (s.startsWith('[') && s.endsWith(']')) {
    return { type: 'array', items: splitTopLevel(s.slice(1, -1)).map(parseExpression) };
  }
  var parenIdx = s.indexOf('(');
  if (parenIdx > 0 && s.endsWith(')')) {
    var fname = s.substring(0, parenIdx).trim();
    var inner = s.substring(parenIdx + 1, s.length - 1);
    var args = splitTopLevel(inner).map(parseExpression);
    return { type: 'call', name: fname, args: args };
  }
  if (s.startsWith('$') || /^[a-zA-Z_]\w*$/.test(s)) {
    return { type: 'ref', name: s };
  }
  return { type: 'string', value: s };
}

function splitTopLevel(s) {
  var parts = [], depth = 0, current = '', inStr = false;
  for (var i = 0; i < s.length; i++) {
    var c = s[i];
    if (c === '"' && (i === 0 || s[i-1] !== '\\')) { inStr = !inStr; current += c; continue; }
    if (inStr) { current += c; continue; }
    if (c === '(' || c === '[') depth++;
    else if (c === ')' || c === ']') depth--;
    if (c === ',' && depth === 0) { parts.push(current.trim()); current = ''; }
    else current += c;
  }
  if (current.trim()) parts.push(current.trim());
  return parts;
}

// ====== Component Renderers ======
var h = React.createElement;

// Chart drawing (minimal canvas-based)
function drawChart(canvas, type, labels, series, colors) {
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var w = canvas.clientWidth, h2 = canvas.clientHeight;
  canvas.width = w * dpr; canvas.height = h2 * dpr;
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, w, h2);

  var pad = { t: 20, r: 16, b: 36, l: 52 };
  var cw = w - pad.l - pad.r, ch = h2 - pad.t - pad.b;
  var allVals = [];
  series.forEach(function(s) { s.data.forEach(function(v) { allVals.push(v); }); });
  var maxVal = Math.max.apply(null, allVals.concat([1]));
  var minVal = Math.min.apply(null, allVals.concat([0]));
  if (minVal > 0) minVal = 0;
  var range = maxVal - minVal || 1;

  // Grid lines
  ctx.strokeStyle = '#27272a'; ctx.lineWidth = 1;
  for (var g = 0; g <= 4; g++) {
    var gy = pad.t + ch - (g / 4) * ch;
    ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(w - pad.r, gy); ctx.stroke();
    ctx.fillStyle = '#71717a'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(Math.round(minVal + (g / 4) * range).toLocaleString(), pad.l - 8, gy + 4);
  }

  // X labels
  ctx.fillStyle = '#71717a'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  var step = Math.max(1, Math.floor(labels.length / 8));
  for (var li = 0; li < labels.length; li += step) {
    var lx = pad.l + (li / Math.max(labels.length - 1, 1)) * cw;
    ctx.fillText(String(labels[li]).substring(0, 10), lx, h2 - 8);
  }

  if (type === 'pie') {
    // Pie chart
    var total = allVals.reduce(function(a,b){return a+b;}, 0) || 1;
    var cx2 = w/2, cy = h2/2, radius = Math.min(cw, ch)/2 - 10;
    var startAngle = -Math.PI/2;
    colors = ['#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#8b5cf6'];
    for (var pi = 0; pi < series[0].data.length; pi++) {
      var sliceAngle = (series[0].data[pi] / total) * 2 * Math.PI;
      ctx.beginPath(); ctx.moveTo(cx2, cy);
      ctx.arc(cx2, cy, radius, startAngle, startAngle + sliceAngle);
      ctx.fillStyle = colors[pi % colors.length]; ctx.fill();
      // Label
      if (labels[pi]) {
        var midAngle = startAngle + sliceAngle / 2;
        var lx2 = cx2 + (radius * 0.65) * Math.cos(midAngle);
        var ly2 = cy + (radius * 0.65) * Math.sin(midAngle);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(labels[pi], lx2, ly2);
      }
      startAngle += sliceAngle;
    }
    return;
  }

  // Line/Bar charts
  colors = ['#6366f1','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#8b5cf6'];
  for (var si = 0; si < series.length; si++) {
    var sData = series[si].data;
    var color = colors[si % colors.length];
    if (type === 'bar') {
      var barW = (cw / labels.length) / (series.length + 1);
      for (var bi = 0; bi < sData.length; bi++) {
        var bx = pad.l + (bi / Math.max(labels.length, 1)) * cw + (si + 0.5) * barW;
        var barH = ((sData[bi] - minVal) / range) * ch;
        var by = pad.t + ch - barH;
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(bx - barW * 0.4, by, barW * 0.8, barH, [3, 3, 0, 0]);
        ctx.fill();
      }
    } else {
      ctx.strokeStyle = color; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
      ctx.beginPath();
      for (var di = 0; di < sData.length; di++) {
        var dx = pad.l + (di / Math.max(sData.length - 1, 1)) * cw;
        var dy = pad.t + ch - ((sData[di] - minVal) / range) * ch;
        if (di === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
      }
      ctx.stroke();
      // Dots
      ctx.fillStyle = color;
      for (var di2 = 0; di2 < sData.length; di2++) {
        var dx2 = pad.l + (di2 / Math.max(sData.length - 1, 1)) * cw;
        var dy2 = pad.t + ch - ((sData[di2] - minVal) / range) * ch;
        ctx.beginPath(); ctx.arc(dx2, dy2, 3.5, 0, Math.PI * 2); ctx.fill();
      }
    }
  }
  // Legend
  if (series.length > 1) {
    var lx3 = pad.l;
    for (var li2 = 0; li2 < series.length; li2++) {
      ctx.fillStyle = colors[li2 % colors.length];
      ctx.fillRect(lx3, 4, 10, 10);
      ctx.fillStyle = '#a1a1aa'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(series[li2].name, lx3 + 14, 13);
      lx3 += ctx.measureText(series[li2].name).width + 30;
    }
  }
}

// Resolve an expression to a value, given a statements map and optional context
function resolve(expr, stmts, ctx) {
  if (!expr) return null;
  switch(expr.type) {
    case 'string': return expr.value;
    case 'number': return expr.value;
    case 'boolean': return expr.value;
    case 'null': return null;
    case 'ref':
      if (ctx && expr.name in ctx) return ctx[expr.name];
      if (expr.name in stmts) return stmts[expr.name];
      return null;
    case 'array': return expr.items.map(function(e){ return resolve(e, stmts, ctx); });
    case 'call': return expr; // Return the call node itself for rendering
    default: return null;
  }
}

// Component map
var COMPONENTS = {
  Stack: function(props, children) {
    var dir = props[0] || 'column';
    var gap = ({ s:6, m:12, l:20 })[props[1]] || 12;
    var cls = 'openui-stack' + (dir === 'row' ? ' openui-stack-row' : '');
    return h('div', { className: cls, style: { gap: gap } }, children);
  },
  Card: function(props, children) {
    return h('div', { className: 'openui-card' }, children);
  },
  CardHeader: function(props) {
    var title = props[0] || '';
    var subtitle = props[1] || '';
    return h('div', null,
      h('div', { className: 'openui-card-header' }, title),
      subtitle ? h('div', { className: 'openui-card-subtitle' }, subtitle) : null
    );
  },
  TextContent: function(props) {
    var text = String(props[0] || '');
    var variant = props[1] || '';
    var cls = 'openui-text' + (variant ? ' openui-text-' + variant : '');
    return h('div', { className: cls }, text);
  },
  Table: function(props) {
    var cols = props[0] || [];
    var rows = props[1] || [];
    return h('div', { style: { overflowX: 'auto' } },
      h('table', { className: 'openui-table' },
        h('thead', null, h('tr', null,
          cols.map(function(c, i) { return h('th', { key: i }, c.label || c.name || ''); })
        )),
        h('tbody', null,
          rows.map(function(row, ri) {
            return h('tr', { key: ri },
              row.map(function(cell, ci) {
                var isNum = typeof cell === 'number';
                return h('td', { key: ci, className: isNum ? 'num' : '' },
                  cell === null || cell === undefined ? '-' : String(cell)
                );
              })
            );
          })
        )
      )
    );
  },
  Tag: function(props) {
    var text = String(props[0] || '');
    var color = props[1] || 'neutral';
    var size = props[2] || '';
    var variant = props[3] || color;
    var cls = 'openui-tag openui-tag-' + variant;
    if (size) cls += ' openui-tag-' + size;
    return h('span', { className: cls }, text);
  },
  Image: function(props) {
    return h('img', { className: 'openui-image', src: props[0] || '', alt: props[1] || '' });
  },
  Buttons: function(props, children) {
    return h('div', { className: 'openui-btn-row' }, children);
  },
  Button: function(props) {
    var label = props[0] || 'Button';
    var variant = props[1] || 'primary';
    var cls = 'openui-btn openui-btn-' + variant;
    return h('button', { className: cls, onClick: function(){ window.__openui_action && window.__openui_action(label); } }, label);
  },
  Callout: function(props) {
    var variant = props[0] || 'info';
    var title = props[1] || '';
    var body = props[2] || '';
    var icons = { info:'ℹ️', success:'✅', warning:'⚠️', error:'❌' };
    return h('div', { className: 'openui-callout openui-callout-' + variant },
      h('span', { className: 'openui-callout-icon' }, icons[variant] || 'ℹ️'),
      h('div', null,
        title ? h('div', { style: { fontWeight: 600, marginBottom: 2 } }, title) : null,
        h('div', null, body)
      )
    );
  },
  Form: function(props, children) {
    var name = props[0] || 'form';
    return h('form', { className: 'openui-form', onSubmit: function(e){ e.preventDefault(); } }, children);
  },
  FormControl: function(props, children) {
    var label = props[0] || '';
    return h('div', { className: 'openui-form-control' },
      label ? h('label', null, label) : null,
      children
    );
  },
  Input: function(props) {
    var name = props[0] || '';
    var placeholder = props[1] || '';
    var type = props[2] || 'text';
    return h('input', { className: 'openui-input', type: type, placeholder: placeholder, name: name });
  },
  TextArea: function(props) {
    var name = props[0] || '';
    var placeholder = props[1] || '';
    return h('textarea', { className: 'openui-input', placeholder: placeholder, name: name, rows: 4, style: { resize: 'vertical' } });
  },
  Select: function(props) {
    var name = props[0] || '';
    var items = props[1] || [];
    return h('select', { className: 'openui-select', name: name },
      items.map(function(item, i) {
        return h('option', { key: i, value: item.value || item.label || '' }, item.label || item.value || '');
      })
    );
  },
  SelectItem: function(props) {
    return { value: props[0] || '', label: props[1] || props[0] || '' };
  },
  LineChart: function(props) {
    var labels = props[0] || [];
    var series = props[1] || [];
    var ref = React.useRef(null);
    React.useEffect(function() {
      drawChart(ref.current, 'line', labels, series.map(function(s){return {name:s.name,data:s.data};}), []);
    });
    return h('div', { className: 'openui-chart-container' },
      h('canvas', { ref: ref })
    );
  },
  BarChart: function(props) {
    var labels = props[0] || [];
    var series = props[1] || [];
    var ref = React.useRef(null);
    React.useEffect(function() {
      drawChart(ref.current, 'bar', labels, series.map(function(s){return {name:s.name,data:s.data};}), []);
    });
    return h('div', { className: 'openui-chart-container' },
      h('canvas', { ref: ref })
    );
  },
  PieChart: function(props) {
    var labels = props[0] || [];
    var series = props[1] || [];
    var ref = React.useRef(null);
    React.useEffect(function() {
      drawChart(ref.current, 'pie', labels, series.map(function(s){return {name:s.name,data:s.data};}), []);
    });
    return h('div', { className: 'openui-chart-container' },
      h('canvas', { ref: ref })
    );
  },
  Series: function(props) {
    return { name: props[0] || '', data: props[1] || [] };
  },
  Col: function(props) {
    return { label: props[0] || '', type: props[1] || 'string' };
  },
  Modal: function(props, children) {
    var title = props[0] || '';
    var isOpen = props[1];
    if (!isOpen) return null;
    return h('div', { className: 'openui-modal-overlay', onClick: function(e){
      if (e.target === e.currentTarget) window.__openui_action && window.__openui_action('close_modal');
    }},
      h('div', { className: 'openui-modal' },
        h('div', { className: 'openui-modal-title' }, title),
        children
      )
    );
  },
  FollowUpBlock: function(props) {
    var text = props[0] || '';
    return h('div', { className: 'openui-followup', onClick: function(){
      window.__openui_action && window.__openui_action(text);
    } }, text);
  },
  ListBlock: function(props, children) {
    return h('div', null, children);
  },
  ListItem: function(props) {
    return h('div', { className: 'openui-list-item' },
      h('div', { className: 'openui-list-item-title' }, props[0] || ''),
      props[1] ? h('div', { className: 'openui-list-item-sub' }, props[1]) : null
    );
  },
  SectionBlock: function(props, children) {
    var title = props[0] || '';
    return h('div', { className: 'openui-section-block' },
      title ? h('div', { className: 'openui-section-title' }, title) : null,
      children
    );
  },
  CodeBlock: function(props) {
    return h('pre', { className: 'openui-code' },
      h('code', null, props[1] || '')
    );
  },
  Accordion: function(props, children) {
    return h('div', null, children);
  },
  AccordionItem: function(props, children) {
    var title = props[0] || '';
    var _setOpen = React.useState(false);
    var open = _setOpen[0], setOpen = _setOpen[1];
    return h('div', { className: 'openui-accordion-item' },
      h('div', { className: 'openui-accordion-trigger', onClick: function(){ setOpen(!open); } },
        h('span', null, title),
        h('span', null, open ? '−' : '+')
      ),
      open ? h('div', { className: 'openui-accordion-content' }, children) : null
    );
  },
  Tabs: function(props, children) {
    var _active = React.useState(0);
    var active = _active[0], setActive = _active[1];
    var items = children || [];
    return h('div', null,
      h('div', { className: 'openui-tabs' },
        items.map(function(item, i) {
          if (!item) return null;
          var trigger = item.props && item.props.trigger || 'Tab ' + (i+1);
          return h('div', { key: i, className: 'openui-tab' + (active===i?' active':''), onClick: function(){ setActive(i); } }, trigger);
        })
      ),
      h('div', { className: 'openui-tab-content' },
        items[active] ? items[active].props.children : null
      )
    );
  },
  TabItem: function(props, children) {
    return h('div', { trigger: props[1] || '' }, children);
  },
  Carousel: function(props, children) {
    return h('div', { style: { overflowX: 'auto', display: 'flex', gap: 12, scrollSnapType: 'x mandatory', paddingBottom: 8 } },
      (children || []).map(function(child, i) {
        return h('div', { key: i, style: { scrollSnapAlign: 'start', minWidth: 280, flexShrink: 0 } }, child);
      })
    );
  },
  Separator: function() {
    return h('div', { className: 'openui-separator' });
  }
};

// Series/Col/SelectItem return objects, not React elements — need special handling
var OBJECT_COMPONENTS = { Series: true, Col: true, SelectItem: true };

// Render a call expression to a React element or object
function renderCall(expr, stmts) {
  if (expr.type !== 'call') return resolve(expr, stmts);
  var compName = expr.name;
  var Comp = COMPONENTS[compName];
  if (!Comp) {
    // Unknown component — render as text
    return h('div', { className: 'openui-text openui-text-small', style: { color: '#f87171' } },
      '[Unknown: ' + compName + ']'
    );
  }
  // Resolve args
  var resolvedArgs = expr.args.map(function(arg) {
    return renderValue(arg, stmts);
  });
  // Separate children (arrays and nested calls that are not object components) from props
  var props = [], children = [];
  for (var i = 0; i < resolvedArgs.length; i++) {
    var arg = resolvedArgs[i];
    if (arg === null || arg === undefined) continue;
    if (Array.isArray(arg)) {
      // Flatten array children
      arg.forEach(function(item) { children.push(item); });
    } else if (React.isValidElement(arg)) {
      children.push(arg);
    } else if (typeof arg === 'object' && !React.isValidElement(arg)) {
      // Object prop (like Series, Col) — pass as-is for components that expect it
      props.push(arg);
    } else {
      props.push(arg);
    }
  }
  // For object-returning components
  if (OBJECT_COMPONENTS[compName]) {
    return Comp(expr.args.map(function(a){ return resolve(a, stmts); }));
  }
  return Comp(props, children.length > 0 ? children : undefined);
}

// Render any value
function renderValue(val, stmts) {
  if (!val) return null;
  if (Array.isArray(val)) {
    return val.map(function(v) { return renderValue(v, stmts); });
  }
  if (typeof val === 'object' && val.type === 'call') {
    return renderCall(val, stmts);
  }
  return resolve(val, stmts);
}

// Main render function
function renderTree(stmts) {
  var rootExpr = stmts.root;
  if (!rootExpr) return h('div', { className: 'error-box' }, 'No root expression found');
  return renderCall(rootExpr, stmts);
}

// ====== Entry Point ======
try {
  var code = '__OPENUI_CODE__';
  var stmts = parseOpenUILang(code);
  console.log('Parsed statements:', Object.keys(stmts));
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(renderTree(stmts));
} catch(e) {
  document.getElementById('root').innerHTML =
    '<div class="error-box"><strong>Render Error:</strong> ' + e.message + '</div>';
  console.error(e);
}
})();
</script>
