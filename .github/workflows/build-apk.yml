name: Build App

on:
  push:
    # Trigger only for main branch.
    branches: [ main, master ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Get the app source
      - name: Get the source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # Set up Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Make gradlew executable and fix line endings
      - name: Fix gradlew permissions and line endings
        run: |
          chmod +x ./gradlew
          dos2unix ./gradlew || true
      
      # Clean and compile the apk                                                                                  │
      - name: Clean and Generate Debug APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          ./gradlew --stop-gradle-daemon || true
          ./gradlew clean
          ./gradlew assembleDebug -x test --warning-mode=all --stacktrace

      # Upload the action artifact                                                                                 │
      - name: Upload Debug APK (artifact)
        uses: actions/upload-artifact@v4                                                                           │  
        with:                                                                                                      │  
          name: debug-apk                                                                                          │  
          path: app/build/outputs/apk/debug/app-debug.apk

      # Setup signing keystore from secrets
      - name: Setup signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/operit-release-key.jks
          echo "RELEASE_STORE_FILE=operit-release-key.jks" >> local.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> local.properties

      # Clean and compile the release apk
      - name: Clean and Generate Release APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          ./gradlew --stop-gradle-daemon || true
          ./gradlew clean
          ./gradlew assembleRelease -x test --warning-mode=all --stacktrace

      # Upload the release APK artifact
      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk



