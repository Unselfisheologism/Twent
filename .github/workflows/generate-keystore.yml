name: Generate Release Keystore

on:
  workflow_dispatch:
    inputs:
      keystore_password:
        description: 'Keystore Password (min 6 characters)'
        required: true
        type: string

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore operit-release-key.jks \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -alias operit-key \
            -storepass "${{ inputs.keystore_password }}" \
            -keypass "${{ inputs.keystore_password }}" \
            -dname "CN=Operit, OU=Development, O=com.ai.assistance.operit, L=Unknown, ST=Unknown, C=US"

      - name: Encode to Base64
        run: |
          base64 operit-release-key.jks > operit-key-base64.txt

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            operit-release-key.jks
            operit-key-base64.txt
          retention-days: 1

      - name: Show Instructions
        run: |
          echo "✅ Keystore generated successfully!"
          echo ""
          echo "📥 Download the artifacts (keystore-keybase64.txt) from this workflow run."
          echo ""
          echo "🔐 Then add these secrets to your repository:"
          echo "  KEYSTORE_BASE64 = (content of operit-key-base64.txt)"
          echo "  KEYSTORE_PASSWORD = ${{ inputs.keystore_password }}"
          echo "  KEY_ALIAS = operit-key"
          echo "  KEY_PASSWORD = ${{ inputs.keystore_password }}"
